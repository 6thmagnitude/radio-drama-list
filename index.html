  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e8e4dc;
    --border-hover: #c8c0b0;
    --text: #1a1714;
    --text-2: #6b6560;
    --text-3: #9e9892;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --gray-light: #F1EFE8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* ── Header ── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .site-title { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .site-title span { color: var(--purple); }
  /* ── Search ── */
  .search-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--purple-mid); }
  .search-wrap .icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-3); font-size: 15px; pointer-events: none;
  }
  /* ── Tabs ── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab-nav-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; gap: 0; overflow-x: auto; padding: 0 2rem;
  }
  .tab-btn {
    padding: 12px 20px;
    font-size: 14px; font-weight: 500;
    color: var(--text-2);
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }
  .tab-count {
    display: inline-block;
    background: var(--purple-light);
    color: var(--purple);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 999px;
    margin-left: 5px;
  }
  /* ── Toolbar (filter row) ── */
  .toolbar {
    max-width: 1200px; margin: 0 auto;
    padding: 1rem 2rem 0;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
  .result-count { font-size: 13px; color: var(--text-3); white-space: nowrap; }
  /* ── Grid ── */
  .grid-wrap { max-width: 1200px; margin: 0 auto; padding: 1.25rem 2rem 3rem; }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    cursor: default;
  }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .card-img {
    width: 100%; aspect-ratio: 3/4;
    background: var(--gray-light);
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .card-img img[src=""],
  .card-img img:not([src]) { display: none; }
  .card-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-3); font-size: 12px;
  }
  .card-placeholder .mic { font-size: 28px; opacity: 0.3; }
  .era-badge {
    position: absolute; top: 8px; left: 8px;
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    color: #fff; font-weight: 500;
  }
  .status-badge {
    position: absolute; top: 8px; right: 8px;

  .status-ongoing { background: rgba(186,117,23,0.85); color: #fff; }
  .status-hiatus { background: rgba(100,100,100,0.75); color: #fff; }
  .card-body { padding: 11px 13px 13px; }
  .card-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    line-height: 1.4; margin-bottom: 4px;
  }
  .card-sub { font-size: 12px; color: var(--text-2); margin-bottom: 6px; line-height: 1.5; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag {
    font-size: 11px; padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-2);
  }
  .tag-platform { background: var(--purple-light); color: var(--purple); border-color: var(--purple-mid); }
  .tag-genre { background: var(--teal-light); color: var(--teal); border-color: #9FE1CB; }
  .stars { font-size: 13px; color: var(--amber); letter-spacing: 1px; margin-bottom: 4px; }
  .cv-row { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
  .memo-preview {
    font-size: 11px; color: var(--text-2); line-height: 1.6;
    border-top: 1px solid var(--border); padding-top: 6px; margin-top: 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .memo-hint {
    display: inline-flex; align-items: center; gap: 3px;
    margin-top: 6px;
    font-size: 11px; color: var(--purple);
    border-top: 1px solid var(--border); padding-top: 6px; width: 100%;
  }
  /* ── Empty ── */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text-3); }
  .empty p { font-size: 15px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    max-width: 540px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    padding: 1.5rem;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; font-size: 20px;
    color: var(--text-2); cursor: pointer; padding: 4px;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-meta { font-size: 13px; color: var(--text-2); margin-bottom: 12px; }
  .modal-section { font-size: 13px; margin-bottom: 8px; line-height: 1.7; }
  .modal-section strong { color: var(--text-3); font-weight: 500; display: block; font-size: 11px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-stars { font-size: 18px; color: var(--amber); margin-bottom: 10px; }
  .modal-memo { font-size: 13px; color: var(--text-2); line-height: 1.75; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
</style>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const TABS = [
  { id:'complete', label:'網配劇（完結）', data: complete, filterKey:'era' },
  { id:'ongoing',  label:'網配劇（連載中）', data: ongoing,  filterKey:'era' },
  { id:'commercial', label:'商劇', data: commercial, filterKey:'era' },
  { id:'audiobook', label:'有聲書（商）', data: audiobook, filterKey:'era' },
];
let curTab = 0;
let curFilter = 'all';
let searchQ = '';

// ══════════════════════════════════════════════
//  ERA COLORS
// ══════════════════════════════════════════════
const ERA_COLOR = {
  '現代':'#1D9E75', '古代':'#BA7517', '架空':'#534AB7',
  '民國':'#D85A30', '架空（虛構）':'#534AB7',
};

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderTabs() {
  const nav = document.getElementById('tabNav');
  nav.innerHTML = TABS.map((t,i) => `
    <button class="tab-btn ${i===curTab?'active':''}" onclick="switchTab(${i})">
      ${t.label}<span class="tab-count">${t.data.length}</span>
    </button>
  `).join('');
}

function getFilters() {
  const data = TABS[curTab].data;
  const eras = [...new Set(data.map(d => d.era).filter(Boolean))].sort();
  return eras;
}

function renderFilters() {
  const eras = getFilters();
  const row = document.getElementById('filterRow');
  row.innerHTML = `<button class="filter-btn ${curFilter==='all'?'active':''}" onclick="setFilter('all')">全部</button>` +
    eras.map(e => `<button class="filter-btn ${curFilter===e?'active':''}" onclick="setFilter('${e}')">${e}</button>`).join('');
}

function getFiltered() {
  let data = TABS[curTab].data;
  if (curFilter !== 'all') data = data.filter(d => d.era === curFilter || (curFilter==='架空' && d.era==='架空（虛構）'));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    data = data.filter(d =>
      d.title.toLowerCase().includes(q) ||
      (d.cv||'').toLowerCase().includes(q) ||
      (d.genre||'').includes(q) ||
      (d.platform||'').includes(q)
    );
  }
  return data;
}

function starsHtml(n) {
  if (!n && n !== 0) return '';
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function statusBadge(d) {
  const s = d.status || '';
  if (s === '連載中') return '<span class="status-badge status-ongoing">連載中</span>';
  if (s === '斷更')   return '<span class="status-badge status-hiatus">斷更</span>';
  return '';
}

function eraColor(era) {
  return ERA_COLOR[era] || '#888';
}

function renderCards() {
  const data = getFiltered();
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('resultCount').textContent = `共 ${data.length} 部`;
  if (!data.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = data.map((d,i) => {
    const era = d.era || '';
    const platforms = (d.platform||'').split(/[、,]/).map(p=>p.trim()).filter(Boolean);
    const imgId = `img_${curTab}_${i}`;
    // 圖片預留位
    const imgHtml = `
      <img id="${imgId}" src="" alt="" style="display:none" onerror="this.style.display='none'">
      <div class="card-placeholder">
        <span class="mic">🎙</span>
        <span>尚未配圖</span>
      </div>`;
    return `
      <div class="card" onclick="openModal(${curTab},${TABS[curTab].data.indexOf(d)})">
        <div class="card-img">
          ${imgHtml}
          ${era?`<span class="era-badge" style="background:${eraColor(era)}99">${era}</span>`:''}
          ${statusBadge(d)}
        </div>
        <div class="card-body">
          <div class="card-title">${d.title}</div>
          <div class="card-sub">${d.year||''}${d.ep?' · '+d.ep:''}${d.type?' · '+d.type:''}</div>
          <div class="tag-row">
            ${d.genre?`<span class="tag tag-genre">${d.genre}</span>`:''}
            ${platforms.map(p=>`<span class="tag tag-platform">${p}</span>`).join('')}
          </div>
          ${d.stars?`<div class="stars">${starsHtml(d.stars)}</div>`:''}
          ${d.cv?`<div class="cv-row">CV：${d.cv}</div>`:''}
          ${d.memo
            ? `<div class="memo-preview">${d.memo}</div>`
            : `<div class="memo-hint">✏ 點開看詳細</div>`
          }
        </div>
      </div>`;
  }).join('');
}

function render() {
  renderTabs();
  renderFilters();
  renderCards();
}

// ══════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════
function switchTab(i) { curTab=i; curFilter='all'; render(); }
function setFilter(f) { curFilter=f; renderFilters(); renderCards(); }
function onSearch() { searchQ=document.getElementById('searchInput').value; renderCards(); }

// ── Modal ──
function openModal(tabIdx, dataIdx) {
  const d = TABS[tabIdx].data[dataIdx];
  if (!d) return;
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div class="modal-title">${d.title}</div>
    <div class="modal-meta">${[d.year, d.ep, d.type].filter(Boolean).join(' · ')}</div>
    ${d.stars ? `<div class="modal-stars">${starsHtml(d.stars)}</div>` : ''}
    ${d.era ? `<div class="modal-section"><strong>時代背景</strong>${d.era}</div>` : ''}
    ${d.genre ? `<div class="modal-section"><strong>題材</strong>${d.genre}</div>` : ''}
    ${d.cv ? `<div class="modal-section"><strong>配音演員 CV</strong>${d.cv}</div>` : ''}
    ${d.platform ? `<div class="modal-section"><strong>平台</strong>${d.platform}</div>` : ''}
    ${d.memo ? `<div class="modal-memo"><strong style="display:block;font-size:11px;color:var(--text-3);letter-spacing:0.05em;margin-bottom:6px">✏ 聽劇筆記</strong>${d.memo}</div>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) { if(e.target===document.getElementById('modal')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal').classList.remove('open'); }

// ── init ──
render();
</script>
